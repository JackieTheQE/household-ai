version: "3.8"

# household-ai — open-webui + Ollama bridge
# Run with: podman-compose up -d
# Requires: Ollama running on the host at port 11434

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: household-ai
    restart: unless-stopped

    ports:
      - "3000:8080"       # Access at http://localhost:3000

    volumes:
      - open-webui-data:/app/backend/data          # Persistent chat history, users, settings
      - ./config/webui_config.json:/app/backend/data/config.json:ro  # Optional: pre-seed config

    environment:
      # ── Ollama connection ──────────────────────────────────────────────────
      # Uses host.containers.internal to reach Ollama on your host machine.
      # On Linux with Podman you may need: --add-host=host.containers.internal:host-gateway
      - OLLAMA_BASE_URL=http://host.containers.internal:11434

      # ── Security ──────────────────────────────────────────────────────────
      - WEBUI_SECRET_KEY_FILE=/run/secrets/webui_secret   # Read key from secret
      - WEBUI_AUTH=true                                    # Require login
      - ENABLE_SIGNUP=true                                 # Allow first user to register (admin)
                                                           # Set to false after setup

      # ── Privacy / telemetry ───────────────────────────────────────────────
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=1
      - ANONYMIZED_TELEMETRY=false

      # ── Optional: disable features you don't need yet ─────────────────────
      - ENABLE_IMAGE_GENERATION=false
      - ENABLE_COMMUNITY_SHARING=false
      - ENABLE_MESSAGE_RATING=false

      # ── OpenAI-compatible endpoint (future use) ───────────────────────────
      # Uncomment and fill in when you want to add OpenAI/compatible APIs:
      # - OPENAI_API_KEY=
      # - OPENAI_API_BASE_URL=https://api.openai.com/v1

    secrets:
      - webui_secret

    # Reach Ollama on the host (Podman-specific)
    extra_hosts:
      - "host.containers.internal:host-gateway"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  open-webui-data:
    driver: local

# ── Secrets ───────────────────────────────────────────────────────────────────
secrets:
  webui_secret:
    file: ./secrets/webui_secret.txt    # Generated by setup.sh
